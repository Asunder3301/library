<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./modern-normalize.css">
    <link rel="stylesheet" href="./styles.css">
    <script src="main.js" defer></script>
    <title>Library</title>
</head>
<body>
    <div id="container">
        <button command="show-modal" commandfor="form-container" type="button" id="add-btn" class="card">
            <p>Add Book</p>
            <svg width="64px" height="64px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                    <path d="M6 12H18M12 6V18" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> 
                </g>
            </svg>
        </button>

        <dialog id="form-container" closeby="none">
            <button command="close" commandfor="form-container" type="button">x</button>
            <form method="dialog" id="form" autofocus>
                <fieldset>
                    <legend>Book Information</legend>

                    <div class="form-group">
                        <label for="title">Book Title</label>
                        <input type="text" id="title" name="title" placeholder="The Stranger">
                    </div>

                    <div class="form-group">
                        <label for="author">Book Author</label>
                        <input type="text" id="author" name="author" placeholder="Albert Camus">
                    </div>

                    <div class="form-group">
                        <label for="pages">Number of Pages</label>
                        <input type="number" id="pages" name="pages" min="0" placeholder="144">
                    </div>  
                </fieldset>

                <fieldset>
                    <legend>Have You Read This Book?</legend>

                    <div class="form-group">
                        <input type="radio" id="yes" name="read" value="true" checked>
                        <label for="yes">Yes</label>
                    </div>

                    <div class="form-group">
                        <input type="radio" id="no" name="read" value="false">
                        <label for="no">No</label>
                    </div>
                </fieldset>

                <button type="submit">Submit</button>
            </form>
        </dialog>
    </div>
    <p>Photo by 
        <a href="https://unsplash.com/@inakihxz?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Iñaki del Olmo</a>
        on 
        <a href="https://unsplash.com/photos/assorted-title-of-books-piled-in-the-shelves-NIJuEQw0RKg?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
    </p>
</body>
</html>
